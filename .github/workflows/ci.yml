name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workspace_os
          POSTGRES_PASSWORD: workspace_os
          POSTGRES_DB: workspace_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workspace_os -d workspace_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://workspace_os:workspace_os@localhost:5432/workspace_os
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Apply database migrations
        run: pnpm --filter @workspace-os/adapters db:migrate

      - name: Integration tests
        run: pnpm --filter @workspace-os/adapters test:integration

      - name: Build
        run: pnpm build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
