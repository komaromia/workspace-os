name: workspace-os-simple

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: workspace_os
      POSTGRES_PASSWORD: workspace_os
      POSTGRES_DB: workspace_os
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace_os -d workspace_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
